<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-AI Nexus Titan | Ultimate Neural Hub</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Orbitron:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        /* =========================================================
           Z-AI NEXUS TITAN CORE DESIGN SYSTEM
           Mix Level: Enterprise AI Platform (100k Logic Simulation)
           =========================================================
        */
        :root {
            --bg-deep: #010409; --bg-surface: #0d1117; --bg-card: #161b22;
            --primary: #58a6ff; --neon: #79c0ff; --accent: #bc8cff;
            --success: #3fb950; --border: #30363d; --text: #c9d1d9;
            --gold: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { 
            background: var(--bg-deep); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- UI Effects --- */
        .scanline { position: fixed; top: 0; width: 100%; height: 2px; background: rgba(88, 166, 255, 0.05); z-index: 1000; animation: scan 8s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: -2%; } to { top: 100%; } }

        /* --- Header --- */
        header {
            height: 55px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px;
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .brand h1 { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; letter-spacing: 2px; color: #fff; }
        .brand span { color: var(--primary); }

        /* --- Layout Grid --- */
        .app-container { display: grid; grid-template-columns: 80px 350px 1fr 300px; height: calc(100vh - 55px); }

        /* Navigation Rail */
        .nav-rail { background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px 0; gap: 25px; align-items: center; }
        .rail-item { width: 48px; height: 48px; border-radius: 14px; display: flex; justify-content: center; align-items: center; color: #8b949e; transition: 0.3s; cursor: pointer; }
        .rail-item:hover, .rail-item.active { background: #21262d; color: var(--primary); border: 1px solid var(--border); }

        /* Control Console */
        .console { background: var(--bg-surface); border-right: 1px solid var(--border); overflow-y: auto; }
        .section-h { padding: 18px 25px; border-bottom: 1px solid var(--border); font-family: 'Orbitron'; font-size: 11px; color: var(--primary); letter-spacing: 2px; }
        .control-group { padding: 25px; border-bottom: 1px solid rgba(48, 54, 61, 0.4); }

        .nexus-input {
            width: 100%; height: 160px; background: #010409; border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; color: white; font-size: 14px; font-family: 'JetBrains Mono'; resize: none; outline: none; transition: 0.4s;
        }
        .nexus-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(88,166,255,0.1); }

        .btn-main {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #1f6feb, #8957e5);
            border: none; border-radius: 12px; color: white; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; margin-top: 15px; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .btn-main:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .select-field { width: 100%; background: #010409; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; }

        /* Viewport */
        .studio-viewport { background: #010409; position: relative; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(#161b22 1px, transparent 1px); background-size: 30px 30px; }
        .canvas-frame { width: 750px; height: 750px; background: #000; border: 1px solid var(--border); position: relative; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        .media-layer { width: 100%; height: 100%; object-fit: cover; }

        /* Loader HUD */
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(1, 4, 9, 0.98);
            z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .ai-ring { width: 120px; height: 120px; border: 4px solid #161b22; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Right Panel */
        .info-panel { background: var(--bg-surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .terminal { flex: 1; background: #000; padding: 20px; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--neon); overflow-y: auto; line-height: 1.8; }
        .stat-card { padding: 20px; border-bottom: 1px solid var(--border); }
        
        .progress-bar { height: 4px; background: #21262d; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <header>
        <div class="brand">
            <i class="fas fa-atom" style="color: var(--primary); font-size: 20px;"></i>
            <h1>Z-AI <span>NEXUS TITAN</span></h1>
        </div>
        <div style="display: flex; gap: 25px; font-size: 11px;">
            <span style="color: var(--success);"><i class="fas fa-check-circle"></i> NODE: CHATTOGRAM-07</span>
            <span id="time" style="font-family: 'JetBrains Mono';">00:00:00</span>
        </div>
    </header>

    <div class="app-container">
        <aside class="nav-rail">
            <div class="rail-item active"><i class="fas fa-image"></i></div>
            <div class="rail-item"><i class="fas fa-video"></i></div>
            <div class="rail-item"><i class="fas fa-layer-group"></i></div>
            <div style="margin-top: auto;" class="rail-item"><i class="fas fa-user-shield"></i></div>
        </aside>

        <section class="console">
            <div class="section-h">NEURAL ENGINE SETUP</div>
            
            <div class="control-group">
                <span style="font-size: 10px; color: #8b949e; text-transform: uppercase;">Prompt Vision</span>
                <textarea class="nexus-input" id="p-input" placeholder="Imagine something incredible..."></textarea>
                <button class="btn-main" onclick="synthesize()">SYNTHESIZE NOW</button>
            </div>

            <div class="control-group">
                <span style="font-size: 10px; color: #8b949e;">Art Engines (HQ)</span>
                <select class="select-field">
                    <option>Midjourney v6.1 (Ultra-Detail)</option>
                    <option>DALL-E 3 (Smart Reasoning)</option>
                    <option>Leonardo.ai (Free Tokens Mode)</option>
                    <option>Canva Magic (Media Design)</option>
                </select>
            </div>

            <div class="control-group">
                <span style="font-size: 10px; color: #8b949e;">Video Engines (Real-Life)</span>
                <select class="select-field">
                    <option>Runway Gen-3 (Pro Choice)</option>
                    <option>Luma Dream Machine (Hyper-Real)</option>
                    <option>Pika Art (Cinematic Motion)</option>
                    <option>InVideo AI (Auto-Script)</option>
                </select>
            </div>
        </section>

        <main class="studio-viewport">
            <div class="hud-overlay" id="hud">
                <div class="ai-ring"></div>
                <h2 style="margin-top: 30px; font-family: 'Orbitron'; letter-spacing: 5px;">SYNTHESIZING...</h2>
                <p id="status" style="font-family: 'JetBrains Mono'; font-size: 11px; margin-top: 15px; color: var(--primary);"></p>
                <div style="width: 350px;" class="progress-bar"><div class="fill" id="bar"></div></div>
            </div>
            
            <div class="canvas-frame">
                <img id="output" src="https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=1200" class="media-layer">
            </div>
        </main>

        <aside class="info-panel">
            <div class="stat-card">
                <span style="font-size: 10px; color: #8b949e; text-transform: uppercase;">Node Resource</span>
                <div class="progress-bar"><div class="fill" style="width: 76%;"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 8px;">
                    <span>H100 CLUSTER</span> <span>76% Load</span>
                </div>
            </div>

            <div class="terminal" id="term">
                [SYS] Nexus Titan Kernel Initialized...<br>
                [SYS] AI Engines (Art & Video) Connected...<br>
                [SYS] Ready for User Input.<br>
            </div>
        </aside>
    </div>

    <script>
        const logs = [
            "Connecting to Neural Servers...",
            "Loading Midjourney/Runway API...",
            "Allocating VRAM Clusters...",
            "Sampling Latent Space...",
            "Step 12/25: Enhancing Details...",
            "Step 25/25: Rendering Output...",
            "Finalizing Masterpiece."
        ];

        function synthesize() {
            const prompt = document.getElementById('p-input').value;
            if(!prompt) return alert("Please input prompt, Zayed!");

            document.getElementById('hud').style.display = 'flex';
            let step = 0;
            let progress = 0;

            const timer = setInterval(() => {
                progress += Math.random() * 12;
                if(progress > 100) progress = 100;
                document.getElementById('bar').style.width = progress + "%";

                if(Math.random() > 0.6 && step < logs.length) {
                    document.getElementById('status').innerText = "> " + logs[step];
                    document.getElementById('term').innerHTML += `[AI] ${logs[step]}<br>`;
                    document.getElementById('term').scrollTop = document.getElementById('term').scrollHeight;
                    step++;
                }

                if(progress >= 100) {
                    clearInterval(timer);
                    const seed = Math.floor(Math.random() * 999999);
                    document.getElementById('output').src = `https://picsum.photos/seed/${seed}/1200/1200`;
                    document.getElementById('output').onload = () => {
                        document.getElementById('hud').style.display = 'none';
                        document.getElementById('bar').style.width = "0%";
                    };
                }
            }, 500);
        }

        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
